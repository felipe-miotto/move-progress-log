name: CI

on:
  pull_request:
    branches: [main, ai-automation]
  push:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: '2.8.3'
          cache: true

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Edge function type check (Deno)
        run: npm run verify:edge-types

      - name: Edge auth guard check
        run: npm run verify:edge-auth

      - name: Query type safety check
        run: npm run verify:query-safety

      - name: Unit tests
        run: npm run test

      - name: Oura integration auth smoke (optional)
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "${VITE_SUPABASE_URL}" ] || [ -z "${VITE_SUPABASE_PUBLISHABLE_KEY}" ]; then
            echo "Skipping Oura integration smoke (missing SUPABASE_URL/SUPABASE_ANON_KEY secrets)."
            exit 0
          fi
          npm run test:oura-integration

      - name: Edge auth smoke (optional)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          RUN_SERVICE_ROLE_TESTS: "false"
        run: |
          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_ANON_KEY}" ]; then
            echo "Skipping edge auth smoke (missing SUPABASE_URL/SUPABASE_ANON_KEY secrets)."
            exit 0
          fi
          scripts/ci-smoke-edge-auth.sh

      - name: Data integrity verifier (optional)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "Skipping data integrity verifier (missing SUPABASE_SERVICE_ROLE_KEY secret)."
            exit 0
          fi
          npm run verify:data-integrity

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Upload edge smoke artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: edge-smoke-report
          path: artifacts/edge-smoke-report.md
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-logs
          path: |
            dist/
          retention-days: 7
